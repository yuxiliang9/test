<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小余的 Todo 管理页</title>
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body data-member-id="member-1" data-member-name="小余" data-member-file="member-1.json">
    <div class="background-shape background-shape-left"></div>
    <div class="background-shape background-shape-right"></div>

    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">LOCAL EDITOR</p>
        <h1 id="pageTitle">个人任务管理</h1>
        <p class="hero-copy" id="pageSubtitle"></p>
      </section>

      <section class="todo-card" aria-label="Todo 管理页">
        <header class="card-header">
          <div>
            <p class="card-title">LOCAL ADMIN</p>
            <h2>任务管理</h2>
          </div>
          <div class="task-badge" id="memberBadge">个人清单</div>
        </header>

        <p class="status-message" id="fileStatus">
          当前使用浏览器本地草稿。建议通过 localhost 打开本页后绑定自己的 JSON 文件，这样可以直接保存。
        </p>

        <div class="editor-toolbar">
          <button class="secondary-button" id="bindFileButton" type="button">绑定个人 JSON</button>
          <button class="secondary-button" id="saveFileButton" type="button" disabled>直接保存</button>
          <button class="secondary-button" id="importButton" type="button">导入 JSON</button>
          <button class="secondary-button" id="exportButton" type="button">导出 JSON</button>
          <button class="ghost-button" id="resetDraft" type="button">重置草稿</button>
          <input class="sr-only" id="fileInput" type="file" accept="application/json,.json" />
        </div>

        <div class="member-panel">
          <label class="field-label" for="ownerNameInput">显示名字</label>
          <input class="text-field" id="ownerNameInput" type="text" maxlength="24" placeholder="例如：小余" />
          <label class="field-label" for="ownerNoteInput">备注说明</label>
          <textarea class="text-field text-area" id="ownerNoteInput" rows="3" maxlength="120" placeholder="例如：这是我的个人任务清单"></textarea>
          <p class="field-hint" id="ownerHint">这里会显示在公开总览页中。</p>
        </div>

        <div class="task-count-bar">
          <span id="taskBadge">0 项任务</span>
        </div>

        <form class="todo-form" id="todoForm">
          <label class="sr-only" for="todoInput">输入任务</label>
          <input id="todoInput" name="todo" type="text" maxlength="120" placeholder="添加一条任务，例如：完成首页设计稿" autocomplete="off" />
          <button type="submit">添加任务</button>
        </form>

        <div class="toolbar">
          <div class="filters" id="filters" role="tablist" aria-label="任务筛选">
            <button class="filter is-active" data-filter="all" type="button">全部</button>
            <button class="filter" data-filter="active" type="button">进行中</button>
            <button class="filter" data-filter="completed" type="button">已完成</button>
          </div>
          <button class="ghost-button" id="clearCompleted" type="button">清除已完成</button>
        </div>

        <ul class="todo-list" id="todoList" aria-live="polite"></ul>

        <footer class="card-footer">
          <p id="taskSummary">还没有任务，先添加一条开始。</p>
        </footer>
      </section>
    </main>

    <template id="todoItemTemplate">
      <li class="todo-item">
        <label class="todo-check">
          <input class="todo-toggle" type="checkbox" />
          <span class="checkmark"></span>
        </label>
        <div class="todo-content">
          <p class="todo-text"></p>
          <span class="todo-meta"></span>
        </div>
        <button class="delete-button" type="button" aria-label="删除任务">删除</button>
      </li>
    </template>

    <script src="./admin.js"></script>
  </body>
</html>
