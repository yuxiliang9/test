<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="background-shape background-shape-left"></div>
    <div class="background-shape background-shape-right"></div>

    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">PUBLIC VIEW</p>
        <h1>三个人的独立待办清单，集中展示在一个页面里。</h1>
        <p class="hero-copy">
          每个人的任务彼此独立、互不影响。所有人都能查看总览，但这里只提供只读展示。
        </p>
      </section>

      <section class="todo-card" aria-label="Todo 公开只读页">
        <header class="card-header">
          <div>
            <p class="card-title">READ ONLY</p>
            <h2>三人任务总览</h2>
          </div>
          <div class="task-badge">公开只读</div>
        </header>

        <p class="readonly-note" id="viewStatus">正在加载三个人的任务数据...</p>

        <div class="toolbar">
          <button class="secondary-button" id="refreshButton" type="button">刷新数据</button>
        </div>

        <div class="board-grid" id="boardContainer" aria-live="polite"></div>
      </section>
    </main>

    <template id="memberBoardTemplate">
      <section class="member-board">
        <header class="member-header">
          <div>
            <h3 class="member-name"></h3>
            <p class="member-note"></p>
          </div>
          <p class="member-stats"></p>
        </header>

        <ul class="todo-list member-list"></ul>
      </section>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
