<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">PUBLIC VIEW</p>
        <h1>按人查看独立待办清单。</h1>
        <p class="hero-copy">
          公开页会读取三个人的独立数据，但每次只显示当前选择的一个人。
        </p>
      </section>

      <section class="todo-card" aria-label="Todo 公开只读页">
        <header class="card-header">
          <div>
            <p class="card-title">READ ONLY</p>
            <h2>任务查看</h2>
          </div>
          <div class="task-badge" id="memberBadge">加载中</div>
        </header>

        <p class="readonly-note" id="viewStatus">正在加载任务数据...</p>

        <div class="toolbar">
          <div class="member-tabs" id="memberTabs" aria-label="选择查看的人"></div>
          <button class="secondary-button" id="refreshButton" type="button">刷新数据</button>
        </div>

        <section class="member-board" id="memberBoard">
          <header class="member-header">
            <div>
              <h3 class="member-name" id="memberName"></h3>
              <p class="member-note" id="memberNote"></p>
            </div>
            <p class="member-stats" id="memberStats"></p>
          </header>

          <ul class="todo-list" id="todoList" aria-live="polite"></ul>
        </section>
      </section>
    </main>

    <template id="todoItemTemplate">
      <li class="todo-item">
        <span class="todo-state" aria-hidden="true"></span>
        <div class="todo-content">
          <p class="todo-text"></p>
          <span class="todo-meta"></span>
        </div>
        <span class="todo-label"></span>
      </li>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
